# 手动定制单设备编译
#
# 特点：
#   - 纯手动触发（workflow_dispatch），不定时、不自动
#   - 所有选项（含设备）以下拉框 / 输入框形式在「Run workflow」界面选择
#   - 设备下拉内置大量机型（受 GitHub 单输入 65535 字符上限约束，放不下的用「⚙ 自定义」）；
#     中文名 ↔ target/subtarget|profile 的映射见仓库根目录 device-map.txt
#   - 下拉选项（系统版本 / 内核 / 设备）由 Update.yml 工作流从「官方最新发布渠道」自动同步，
#     运行一次 Update 即可把三者刷新为所选源码真实支持的最新内容（详见 README）
#   - 只编译你选中的那一个设备，速度快、产物小
#   - 所有源码都在 workflow 运行时才 git clone 拉取
#
name: Build

on:
  workflow_dispatch:
    inputs:
      source:
        description: '源码仓库'
        required: true
        type: choice
        default: immortalwrt/immortalwrt
        options:
          - immortalwrt/immortalwrt        # 官方 ImmortalWrt
          - VIKINGYFY/immortalwrt          # 高通满血 NSS 专用（建议选 main 分支）
          - openwrt/openwrt                # 原版 OpenWrt
          - custom                         # 自定义（在下面 custom_repo 填写）
      custom_repo:
        description: '自定义仓库(source 选 custom 时生效，格式 owner/repo)'
        required: false
        type: string
        default: ''
      branch:
        description: '系统版本 / 分支 / tag（运行时校验是否真实存在于所选源码仓库；常用 openwrt-24.10 / openwrt-23.05 / openwrt-22.03 / master）'
        required: true
        type: choice
        default: openwrt-24.10
        options:
          - "openwrt-25.12"
          - "openwrt-24.10"
          - "openwrt-23.05"
          - "openwrt-21.02"
          - "openwrt-18.06"
          - "openwrt-18.06-k5.4"
          - "master"
      kernel:
        description: '内核版本（运行时按所选目标源码实际支持的内核选取：选具体版本则校验该目标是否支持，不支持回退默认并 warning；选「自动（源码默认）」用分支自带内核）'
        required: true
        type: choice
        default: 自动（源码默认）
        options:
          - "自动（源码默认）"
          - "6.12"
      device:
        description: '设备型号（下拉为「中文名」形式，如「小米 AX3600」；选「⚙ 自定义」后在 custom_device 填写 target/subtarget|profile）'
        required: true
        type: choice
        default: 中国移动 Rax3000m
        options:
