name: Build

on:
  workflow_dispatch:
    inputs:
      source:
        description: '婧愮爜浠撳簱'
        required: true
        type: choice
        default: immortalwrt/immortalwrt
        options:
          - immortalwrt/immortalwrt        # 瀹樻柟 ImmortalWrt
          - VIKINGYFY/immortalwrt          # 楂橀€氭弧琛€ NSS 涓撶敤锛堝缓璁€?main 鍒嗘敮锛?          - openwrt/openwrt                # 鍘熺増 OpenWrt
          - custom                         # 鑷畾涔夛紙鍦ㄤ笅闈?custom_repo 濉啓锛? 

      custom_repo:
        description: '鑷畾涔変粨搴?source 閫?custom 鏃剁敓鏁堬紝鏍煎紡 owner/repo)'
        required: false
        type: string
        default: ''
      branch:
        description: '绯荤粺鐗堟湰 / 鍒嗘敮 / tag锛堣繍琛屾椂鏍￠獙鏄惁鐪熷疄瀛樺湪浜庢墍閫夋簮鐮佷粨搴擄紱甯哥敤 openwrt-24.10 / openwrt-23.05 / openwrt-22.03 / master锛?
        required: true
        type: choice
        default: openwrt-24.10
        options:
          - "openwrt-25.12"
          - "openwrt-24.10"
          - "openwrt-23.05"
          - "openwrt-21.02"
          - "openwrt-18.06"
          - "openwrt-18.06-k5.4"
          - "master"
