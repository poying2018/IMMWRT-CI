          - name: "Rockchip ARMv8 · firefly_roc-rk3568-pc"
            value: "rockchip/armv8|firefly_roc-rk3568-pc"
          - name: "Rockchip ARMv8 · friendlyarm_nanopc-t4"
            value: "rockchip/armv8|friendlyarm_nanopc-t4"
