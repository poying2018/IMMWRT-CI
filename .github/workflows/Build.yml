# 手动定制单设备编译
#
# 特点：
#   - 纯手动触发（workflow_dispatch），不定时、不自动
#   - 所有选项（含设备）以下拉框 / 输入框形式在「Run workflow」界面选择
#   - 设备下拉内置精选热门机型（共约 300 项，受 GitHub 单输入 65535 字符上限限制）；
#     未列出的机型请在 device 下拉选「⚙ 自定义」，再到 custom_device 填写 target|profile
#     （全部 877 个机型见仓库根目录 devices.txt，复制粘贴即可）
#   - 只编译你选中的那一个设备，速度快、产物小
#   - 所有源码都在 workflow 运行时才 git clone 拉取
#
name: Build

on:
  workflow_dispatch:
    inputs:
      source:
        description: '源码仓库'
        required: true
        type: choice
        default: immortalwrt/immortalwrt
        options:
          - immortalwrt/immortalwrt        # 官方 ImmortalWrt
          - VIKINGYFY/immortalwrt          # 高通满血 NSS 专用（建议选 main 分支）
          - openwrt/openwrt                # 原版 OpenWrt
          - custom                         # 自定义（在下面 custom_repo 填写）
      custom_repo:
        description: '自定义仓库(source 选 custom 时生效，格式 owner/repo)'
        required: false
        type: string
        default: ''
      branch:
        description: '系统版本 / 分支 / tag（如 openwrt-24.10、openwrt-23.05、master、v24.10.4）'
        required: true
        type: string
        default: openwrt-24.10
      kernel:
        description: '内核版本'
        required: true
        type: choice
        default: 默认内核
        options:
          - 默认内核        # 跟随该分支的稳定内核
          - 测试版内核      # 启用 CONFIG_TESTING_KERNEL（更高版本，部分平台可用）
      device:
        description: '设备型号（下拉为精选热门机型；选「⚙ 自定义」后在 custom_device 填写 target/subtarget|profile，全部机型见仓库 devices.txt）'
        required: true
        type: choice
        default: mediatek/filogic|cmcc_rax3000m
        options:
          - name: "x86_64 · generic"
            value: "x86/64|generic"
          - name: "Raspberry Pi 4 · rpi-4"
            value: "bcm27xx/bcm2711|rpi-4"
          - name: "Rockchip ARMv8 · 9tripod_x3568-v4"
            value: "rockchip/armv8|9tripod_x3568-v4"
