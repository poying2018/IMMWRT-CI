# 鎵嬪姩瀹氬埗鍗曡澶囩紪璇?#
# 鐗圭偣锛?#   - 绾墜鍔ㄨЕ鍙戯紙workflow_dispatch锛夛紝涓嶅畾鏃躲€佷笉鑷姩
#   - 鎵€鏈夐€夐」锛堝惈璁惧锛変互涓嬫媺妗?/ 杈撳叆妗嗗舰寮忓湪銆孯un workflow銆嶇晫闈㈤€夋嫨
#   - 璁惧涓嬫媺鍐呯疆澶ч噺鏈哄瀷锛堝彈 GitHub 鍗曡緭鍏?65535 瀛楃涓婇檺绾︽潫锛屾斁涓嶄笅鐨勭敤銆屸殭 鑷畾涔夈€嶏級锛?#     涓枃鍚?鈫?target/subtarget|profile 鐨勬槧灏勮浠撳簱鏍圭洰褰?device-map.txt
#   - 涓嬫媺閫夐」锛堢郴缁熺増鏈?/ 鍐呮牳 / 璁惧锛夌敱 Update.yml 宸ヤ綔娴佷粠銆屽畼鏂规渶鏂板彂甯冩笭閬撱€嶈嚜鍔ㄥ悓姝ワ紝
#     杩愯涓€娆?Update 鍗冲彲鎶婁笁鑰呭埛鏂颁负鎵€閫夋簮鐮佺湡瀹炴敮鎸佺殑鏈€鏂板唴瀹癸紙璇﹁ README锛?#   - 鍙紪璇戜綘閫変腑鐨勯偅涓€涓澶囷紝閫熷害蹇€佷骇鐗╁皬
#   - 鎵€鏈夋簮鐮侀兘鍦?workflow 杩愯鏃舵墠 git clone 鎷夊彇
#
