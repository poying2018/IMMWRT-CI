permissions: write-all

env:
  TZ: Asia/Shanghai
  # 鐢ㄦ埛棰勮鎻掍欢锛堝琛岃緭鍏ワ紝杩愯鏃舵寜绌虹櫧鍒囧垎鎴愬涓寘鍚嶏級
  PLUGINS_RAW: ${{ inputs.plugins }}

jobs:
  build:
    name: 鏋勫缓 IMMWRT 鍥轰欢闀滃儚
    runs-on: ubuntu-latest
    steps:
      - name: 妫€鍑烘湰浠撳簱
        uses: actions/checkout@v4

      - name: 閲婃斁纾佺洏绌洪棿
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: 鍒濆鍖栫紪璇戠幆澧?        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq update
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: 瑙ｆ瀽閫夐」
        id: vars
        run: |
          # 婧愮爜浠撳簱
          REPO="${{ inputs.source }}"
          if [ "$REPO" = "custom" ]; then
            REPO="${{ inputs.custom_repo }}"
          fi
          [ -z "$REPO" ] && { echo "::error::鏈寚瀹氭簮鐮佷粨搴?; exit 1; }
          echo "REPO=$REPO"                     >> $GITHUB_ENV
          echo "REPO_URL=https://github.com/$REPO.git" >> $GITHUB_ENV

          # 璁惧瑙ｆ瀽锛氫笅鎷夋槸涓枃鍚嶏紝鍏堝埌 device-map.txt 鍙嶆煡 target/subtarget|profile
          RAW="${{ inputs.device }}"
          if [ "$RAW" = "鈿?鑷畾涔? ]; then
            PROFILE="${{ inputs.custom_device }}"
          else
            PROFILE="$(awk -F'|' -v n="$RAW" '$1==n{print $2"|"$3; exit}' device-map.txt)"
            [ -z "$PROFILE" ] && PROFILE="$RAW"   # 鍏滃簳锛氱敤鎴风洿鎺ョ矘璐翠簡 profile 涓?          fi
          [ -z "$PROFILE" ] && { echo "::error::鏈€夋嫨璁惧锛屾垨鍦ㄣ€屸殭 鑷畾涔夈€嶇殑 custom_device 涓～鍐?target/subtarget|profile"; exit 1; }
          LEFT="${PROFILE%%|*}"
          DEV="${PROFILE##*|}"
          PLAT="${LEFT%%/*}"
          SUB="${LEFT##*/}"
          echo "PLAT=$PLAT"                  >> $GITHUB_ENV
          echo "SUB=$SUB"                    >> $GITHUB_ENV
          echo "DEV=$DEV"                    >> $GITHUB_ENV
          echo "DATE=$(date +'%y.%m.%d-%H%M')" >> $GITHUB_ENV
          echo "SAFE_TARGET=${PLAT}-${SUB}"  >> $GITHUB_ENV

      - name: 鎷夊彇婧愮爜锛堣繍琛屾椂鍏嬮殕锛?        run: |
          # 鏍￠獙鍒嗘敮/tag 鏄惁鐪熷疄瀛樺湪浜庢簮鐮佷粨搴擄紙鏍规嵁婧愪唬鐮佹敮鎸佹儏鍐碉級
          if ! git ls-remote --heads --tags "$REPO_URL" | grep -qE "refs/(heads|tags)/${{ inputs.branch }}$"; then
            echo "::error::鍒嗘敮/鏍囩銆?{{ inputs.branch }}銆嶅湪 $REPO_URL 涓笉瀛樺湪"
            echo "::group::璇ヤ粨搴撳彲鐢ㄧ殑鍒嗘敮锛堝墠 30锛?
            git ls-remote --heads "$REPO_URL" | sed 's#.*refs/heads/##' | head -n 30
            echo "::endgroup::"
            exit 1
          fi
          git clone --depth=1 --single-branch --branch "${{ inputs.branch }}" "$REPO_URL" openwrt
          cd openwrt
          echo "HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
          # 鍘婚櫎鍥藉唴涓嬭浇婧愶紝閬垮厤 Action 閲岃繛涓嶉€?          if [ -f scripts/projectsmirrors.json ]; then
            sed -i '/\.cn\//d; /tencent/d; /aliyun/d' scripts/projectsmirrors.json
          fi

      - name: 鏇存柊骞跺畨瑁?feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 鎷夊彇绗笁鏂规彃浠?        working-directory: openwrt
        run: |
          declare -A EXTRA=(
            [luci-app-openclash]="vernesong/OpenClash dev pkg"
            [luci-app-passwall]="xiaorouji/openwrt-passwall main pkg"
            [luci-app-passwall2]="xiaorouji/openwrt-passwall2 main pkg"
            [luci-app-homeproxy]="VIKINGYFY/homeproxy main whole"
            [luci-app-nikki]="nikkinikki-org/OpenWrt-nikki main whole"
            [luci-theme-argon]="sbwml/luci-theme-argon openwrt-24.10 whole"
          )
          fetch() {
            local key="$1"; local repo br mode
            read -r repo br mode <<< "${EXTRA[$key]}"
            local name="${repo#*/}"
            echo "==> 鎷夊彇绗笁鏂规彃浠?$key ($repo@$br)"
            rm -rf "package/$name" "package/$key"
            git clone --depth=1 --single-branch --branch "$br" "https://github.com/$repo.git" "package/$name" || return 0
            if [ "$mode" = "pkg" ]; then
              find "package/$name" -maxdepth 3 -type d -iname "*$key*" -prune -exec cp -rf {} package/ \;
              rm -rf "package/$name"
            fi
          }
          fetch "luci-theme-argon"
          for raw in $PLUGINS_RAW; do
            name="$(echo "$raw" | sed 's/#.*//; s/CONFIG_PACKAGE_//; s/=y//; s/[[:space:]]//g')"
            [ -z "$name" ] && continue
            if [ -n "${EXTRA[$name]:-}" ]; then fetch "$name"; fi
          done

      - name: 鐢熸垚 .config锛堜粎姝よ澶囷級
        working-directory: openwrt
        run: |
          CFG=.config
          : > $CFG
          # 鏍￠獙璁惧鏄惁鐪熷疄瀛樺湪浜庢簮鐮侊紙鏍规嵁婧愪唬鐮佹敮鎸佹儏鍐碉級
          if ! grep -rq "define Device/${DEV}" "target/linux/${PLAT}/${SUB}/" 2>/dev/null && \
             ! grep -rq "define Device/${DEV}" "target/linux/${PLAT}/" 2>/dev/null; then
            echo "::error::璁惧 ${DEV} 鍦ㄦ簮鐮佺洰鏍?${PLAT}/${SUB} 涓笉瀛樺湪锛岃鎹㈣澶囨垨妫€鏌?custom_device"
            exit 1
          fi
          # 鐩爣骞冲彴 + 鍗曚竴璁惧锛圡ULTI_PROFILE=y 涓斿彧寮€涓€涓?DEVICE => 鍙嚭杩欎竴涓暅鍍忥級
          echo "CONFIG_TARGET_${PLAT}=y"               >> $CFG
          echo "CONFIG_TARGET_${PLAT}_${SUB}=y"        >> $CFG
          echo "CONFIG_TARGET_MULTI_PROFILE=y"         >> $CFG
          echo "CONFIG_TARGET_PER_DEVICE_ROOTFS=y"     >> $CFG
          echo "CONFIG_TARGET_DEVICE_${PLAT}_${SUB}_DEVICE_${DEV}=y" >> $CFG

          # 鍐呮牳鐗堟湰锛氭牴鎹簮浠ｇ爜瀹為檯鏀寔鎯呭喌閫夊彇锛堣繍琛屾椂浠庢簮鐮佽鍙栬鐩爣鍙敤鐨勫唴鏍革級
          KSEL="${{ inputs.kernel }}"
          if [ "$KSEL" != "鑷姩锛堟簮鐮侀粯璁わ級" ]; then
            MK="target/linux/${PLAT}/Makefile"
            [ -f "$MK" ] || MK="target/linux/${PLAT}/${SUB}/Makefile"
            if [ -f "$MK" ]; then
              DEF_KV="$(grep -m1 '^KERNEL_PATCHVER' "$MK" | cut -d= -f2 | tr -d ' ')"
              TST_KV="$(grep -m1 '^KERNEL_TESTING_PATCHVER' "$MK" | cut -d= -f2 | tr -d ' ')"
              VERS="$DEF_KV $TST_KV"
              for d in target/linux/${PLAT}/linux-*; do [ -d "$d" ] && VERS="$VERS ${d##*linux-}"; done
              AVAIL="$(echo "$VERS" | tr ' ' '\n' | grep -v '^$' | sort -V -u)"
              echo "璇ョ洰鏍?$PLAT/$SUB 婧愮爜鏀寔鐨勫唴鏍哥増鏈細$AVAIL锛堥粯璁?$DEF_KV锛屾祴璇曠増 $TST_KV锛?
              if echo "$AVAIL" | grep -qx "$KSEL"; then
                if [ "$KSEL" = "$TST_KV" ] && [ -n "$TST_KV" ]; then
                  sed -i "s/^KERNEL_TESTING_PATCHVER:=.*/KERNEL_TESTING_PATCHVER:=$KSEL/" "$MK"
                  echo "CONFIG_TESTING_KERNEL=y"               >> $CFG
                else
                  sed -i "s/^KERNEL_PATCHVER:=.*/KERNEL_PATCHVER:=$KSEL/" "$MK"
                fi
                echo "鍐呮牳宸插垏鎹负 $KSEL"
              else
                echo "::warning::璇ョ洰鏍?$PLAT/$SUB 涓嶆敮鎸佸唴鏍?$KSEL锛堝彲鐢細$AVAIL锛夛紝淇濇寔婧愮爜榛樿 $DEF_KV"
              fi
            else
              echo "::warning::鏈壘鍒?$MK锛屼繚鎸佹簮鐮侀粯璁ゅ唴鏍?
            fi
          else
            echo "鍐呮牳锛氫娇鐢ㄦ簮鐮侀粯璁わ紙鐢卞垎鏀喅瀹氾級"
          fi

          # LuCI + 涓枃 + 涓婚
          echo "CONFIG_PACKAGE_luci=y"                          >> $CFG
          echo "CONFIG_LUCI_LANG_zh_Hans=y"                     >> $CFG
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y"          >> $CFG
          echo "CONFIG_PACKAGE_luci-theme-${{ inputs.theme }}=y" >> $CFG
          [ "${{ inputs.theme }}" = "argon" ] && echo "CONFIG_PACKAGE_luci-app-argon-config=y" >> $CFG

          # x86 鍑?img + vmdk锛岀粰 1G 鏍瑰垎鍖?          if [ "$PLAT" = "x86" ]; then
            echo "CONFIG_GRUB_IMAGES=y"                 >> $CFG
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=1024"   >> $CFG
          fi

          # 鐢ㄦ埛棰勮鎻掍欢锛堟寜绌虹櫧鍒囧垎锛屽吋瀹规崲琛?绌烘牸鍒嗛殧锛?          for raw in $PLUGINS_RAW; do
            name="$(echo "$raw" | sed 's/#.*//; s/CONFIG_PACKAGE_//; s/=y//; s/[[:space:]]//g')"
            [ -z "$name" ] && continue
            echo "CONFIG_PACKAGE_${name}=y" >> $CFG
          done

          env -u PLAT make defconfig
          # 鏍￠獙棰勮鎻掍欢鏄惁鐪熷疄瀛樺湪浜庢簮鐮?feeds锛堟牴鎹簮浠ｇ爜鏀寔鎯呭喌锛?          if [ -f tmp/.config-package.in ]; then
            for raw in $PLUGINS_RAW; do
              p="$(echo "$raw" | sed 's/#.*//; s/CONFIG_PACKAGE_//; s/=y//; s/[[:space:]]//g')"
              [ -z "$p" ] && continue
              # tmp/.config-package.in 鏄?kconfig 鏂囦欢锛岀鍙峰悕涓?"config PACKAGE_xxx"锛堟棤 CONFIG_ 鍓嶇紑锛屼笖涓嬪垝绾夸唬鏇胯繛瀛楃锛?              p_k="$(echo "$p" | tr '-' '_')"
              if ! grep -Eq "^config PACKAGE_${p_k}\$" tmp/.config-package.in 2>/dev/null; then
                echo "::warning::鎻掍欢 ${p} 鍦ㄦ簮鐮?feeds 涓笉瀛樺湪锛屽凡璺宠繃"
                sed -i "/CONFIG_PACKAGE_${p}=y/d" .config
              fi
            done
          fi
          echo "===== 鏈€缁?target 鐩稿叧閰嶇疆 ====="
          grep -E 'CONFIG_TARGET.*=y' .config | head -n 40

      - name: 瀹氬埗璁剧疆锛圛P / 涓绘満鍚?/ WiFi锛?        working-directory: openwrt
        run: |
          CFG=./package/base-files/files/bin/config_generate
          sed -i "s/192\.168\.[0-9]*\.[0-9]*/${{ inputs.lan_ip }}/g" "$CFG" || true
          sed -i "s/hostname='.*'/hostname='ImmortalWrt'/g" "$CFG" || true
          if [ -n "${{ inputs.ssid }}" ]; then
            for f in $(grep -rl "BASE_SSID=" ./target/linux/ 2>/dev/null); do
              sed -i "s/BASE_SSID='.*'/BASE_SSID='${{ inputs.ssid }}'/g" "$f"
            done
          fi

      - name: 涓嬭浇渚濊禆鍖?        working-directory: openwrt
        # 涓嶈鎶婅繖涓?PLAT(mediatek 绛夌洰鏍囧钩鍙板悕)娉勬紡缁?openwrt 鐨?make 瀛愯繘绋?        run: env -u PLAT make download -j$(nproc) V=s

      - name: 缂栬瘧鍥轰欢锛堜粎姝よ澶囷級
        working-directory: openwrt
        run: |
          echo "寮€濮嬬紪璇戯細$PLAT/$SUB 璁惧 $DEV"
          # 鍏抽敭淇锛氭湰宸ヤ綔娴佹妸鐩爣骞冲彴鍚?濡?mediatek)鍐欒繘浜?$GITHUB_ENV 鐨?PLAT 鍙橀噺锛?          # 浼氳 make 浣滀负鐜鍙橀噺娉勬紡缁?openwrt 瀛愯繘绋嬶紱鑰?ATF 鐨?fiptool 鎶?PLAT 褰撴垚
          # 鈥淎TF 骞冲彴(mt7981 绛?鈥濊В鏋愶紝閬囧埌鏈煡鐨?mediatek 浼氭姤 Invalid platform 瀵艰嚧缂栬瘧澶辫触銆?          # 鍥犳缂栬瘧闃舵蹇呴』娓呯┖璇ョ幆澧冨彉閲忥紙fiptool 鏄€氱敤宸ュ叿锛屼笉闇€瑕?PLAT锛夈€?          unset PLAT
          make -j$(nproc) tools/install || make -j1 V=s tools/install
          make -j$(nproc) toolchain/install || make -j1 V=s toolchain/install
          make -j$(nproc) || make -j1 V=s

      - name: 鏁寸悊浜х墿
        working-directory: openwrt
        run: |
          mkdir -p ../firmware
          find bin/targets/ -type f \( -iname "*.bin" -o -iname "*.img.gz" -o -iname "*.itb" -o -iname "*.fip" -o -iname "*.ubi" -o -iname "*.vmdk" -o -iname "*sysupgrade*" -o -iname "*factory*" -o -iname "*.manifest" \) -exec cp -f {} ../firmware/ \;
          cp -f .config ../firmware/config-${SAFE_TARGET}-${DEV}-${DATE}.txt
          echo "KVER=$(find bin/targets/ -name '*.manifest' -exec grep -oP '^kernel - \K[\d\.]+' {} \; | head -n1)" >> $GITHUB_ENV
          echo "===== 浜х墿 ====="
          ls -lh ../firmware/

      - name: 涓婁紶鍥轰欢锛圓rtifact锛?        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SAFE_TARGET }}-${{ env.DEV }}-${{ env.DATE }}
          path: firmware/*

      - name: 鍙戝竷 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.SAFE_TARGET }}-${{ env.DEV }}-${{ env.DATE }}
          files: firmware/*
          body: |
            鍗曡澶囧畾鍒跺浐浠?
            婧愮爜锛?{{ env.REPO }}
            鍒嗘敮锛?{{ inputs.branch }}
            鎻愪氦锛?{{ env.HASH }}
            鍐呮牳锛?{{ inputs.kernel }}锛?{{ env.KVER }}锛?
            骞冲彴锛?{{ env.SAFE_TARGET }}
            璁惧锛?{{ env.DEV }}
            涓婚锛?{{ inputs.theme }}

            绠＄悊鍦板潃锛?{{ inputs.lan_ip }}
            WiFi 鍚嶇О锛?{{ inputs.ssid }}
            鐧诲綍瀵嗙爜锛氭棤锛堥娆＄櫥褰曡嚜琛岃缃級
